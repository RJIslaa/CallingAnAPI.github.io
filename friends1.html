<script>
  const loadAllBtn = document.getElementById("loadAllBtn");
  const finBtn = document.getElementById("findBtn");
  const friendIDInput = document.getElementById("friendId");
  const tableBody = document.querySelector("#friendsTable tbody");

  function clearTable() {
    tableBody.innerHTML = "";
  }

  function showMessage(message) {
    messageDiv.textContent = message;
  }

  function addFriendToTable(friend) {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${friend.id}</td>
      <td>${friend.firstName}</td>
      <td>${friend.lastName}</td>
      <td>${friend.phone}</td>
    `;
    tableBody.appendChild(row);
  }

async function loadAllFriends() {
  clearTable();
  showMessage("Loading all friends...");
  try {
    const response = await fetch(API_URL);
    if (!response.ok) {
      throw new Error(`Error: ${response.status} ${response.statusText}`);
    }
    const friends = await response.json();
    
    if (!Array.isArray(friends) || friends.length === 0) {
      showMessage("No friends found.");
      return;
    }
    friends.forEach(addFriendToTable);
    showMessage(`Loaded ${friends.length} friends.`);
  } catch (error) {
    showMessage(`Failed to load friends: ${error.message}`);
  }
}
loadAllBtn.addEventListener("click", loadAllFriends);

async function findFriend() { 
  if(id=== ""){
    loadAllFriends();
    return
  }
  clearTable();
  showMessage(`Looking for friend with ID ${id}...`);

  try{
    const response = await fetch(`${API_URL}/${id}`);
    if(response.status === 404){
      showMessage(`Friend with ID ${id} not found.`);
      return;
    }
    if(!response.ok){
      throw new Error(`HTTP error ${response.status} ${response.statusText}`);
    }
    const friend = await response.json();
    addFriendToTable(friend);
    showMessage(`Friend with ID ${id} found.`);
  } catch (error) 
  { 
    showMessage(`Error finding friend: ${error.message}`);
  }
}
findBtn.addEventListener("click", findFriend);
</script>

    <button id="findBtn">Find Friend</button>

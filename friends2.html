<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Friends List</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <h1 class="mb-4 text-center">Friends</h1>

  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>Full Name</th>
      </tr>
    </thead>
    <tbody id="friendsTable"></tbody>
  </table>

  <div id="friendDetails" class="card mt-4 d-none">
    <div class="card-body">
      <h5 class="card-title">Friend Details</h5>
      <p id="detailsContent"></p>
    </div>
  </div>

  <div id="message" class="mt-3 fw-bold"></div>
</div>

<script>
  const API_URL = "https://friends-node-01-47e26a48b0b0.herokuapp.com/friends";

  const tableBody = document.getElementById("friendsTable");
  const messageDiv = document.getElementById("message");
  const detailsCard = document.getElementById("friendDetails");
  const detailsContent = document.getElementById("detailsContent");

  function showMessage(msg) {
    messageDiv.textContent = msg;
  }

  function addFriendRow(friend) {
    const row = document.createElement("tr");

    const fullName = `${friend.firstName} ${friend.lastName}`;

    row.innerHTML = `
      <td>
        <a href="#" onclick="viewFriend(${friend.id}); return false;">
          ${fullName}
        </a>
      </td>
    `;

    tableBody.appendChild(row);
  }

  async function loadFriends() {
    showMessage("Loading friends...");

    try {
      const response = await fetch(API_URL);
      const friends = await response.json();

      tableBody.innerHTML = "";
      friends.forEach(addFriendRow);

      showMessage(`Loaded ${friends.length} friends.`);
    } catch (error) {
      showMessage("Error loading friends.");
    }
  }

  async function viewFriend(id) {
    showMessage(`Loading friend ${id}...`);

    try {
      const response = await fetch(`${API_URL}/${id}`);
      const friend = await response.json();

      detailsCard.classList.remove("d-none");

      detailsContent.innerHTML = `
        <strong>ID:</strong> ${friend.id}<br>
        <strong>First Name:</strong> ${friend.firstName}<br>
        <strong>Last Name:</strong> ${friend.lastName}<br>
        <strong>Phone:</strong> ${friend.phone}
      `;

      showMessage("Friend loaded.");
    } catch (error) {
      showMessage("Error loading friend.");
    }
  }

  loadFriends();
</script>

</body>
</html>
